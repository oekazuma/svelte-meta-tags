  '@sveltejs/kit': ^2.69.2
  '@sveltejs/package': ^2.5.8
  '@sveltejs/vite-plugin-svelte': ^7.2.0
  '@types/eslint': ^9.6.1
  blume: ^1.0.3
  eslint: ^10.7.0
  eslint-config-prettier: ^10.1.8
  eslint-plugin-svelte: ^3.20.0
  globals: ^17.7.0
  prettier: ^3.9.5
  prettier-plugin-svelte: ^4.1.1
  publint: ^0.3.21
  svelte: ^5.56.4
  svelte-check: ^4.7.2
  typescript: ^6.0.3
